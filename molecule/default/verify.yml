---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Check Vector service is running
      ansible.builtin.systemd:
        name: vector
        state: started
      check_mode: true
      register: vector_service
      failed_when: vector_service.changed

    - name: Check Vector config file exists
      ansible.builtin.stat:
        path: /etc/vector/vector.toml
      register: vector_config

    - name: Assert config file exists
      ansible.builtin.assert:
        that:
          - vector_config.stat.exists
          - vector_config.stat.isreg
        fail_msg: "Vector config file does not exist"
        success_msg: "Vector config file exists"

    - name: Check Vector config is valid
      ansible.builtin.command: vector validate /etc/vector/vector.toml
      register: vector_validate
      changed_when: false
      ignore_errors: true

    - name: Assert config is valid
      ansible.builtin.assert:
        that:
          - vector_validate.rc == 0
        fail_msg: "Vector config is invalid: {{ vector_validate.stderr }}"
        success_msg: "Vector config is valid"

    - name: Check Vector binary exists
      ansible.builtin.command: which vector
      register: vector_binary
      changed_when: false

    - name: Assert Vector binary exists
      ansible.builtin.assert:
        that:
          - vector_binary.rc == 0
        fail_msg: "Vector binary not found in PATH"
        success_msg: "Vector binary found"

    - name: Check Vector version
      ansible.builtin.command: vector --version
      register: vector_version
      changed_when: false

    - name: Assert Vector version output
      ansible.builtin.assert:
        that:
          - "'vector' in vector_version.stdout"
        fail_msg: "Vector version command failed"
        success_msg: "Vector version: {{ vector_version.stdout }}"
